name = "ffffound"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# D1: metadata store. Create with:
#   wrangler d1 create ffffound
# then paste the returned database_id here.
[[d1_databases]]
binding = "DB"
database_name = "ffffound2"
database_id = "7920c686-6b27-4659-9411-b1c088760552"
migrations_dir = "migrations"

# R2: image bytes. Create with:
#   wrangler r2 bucket create ffffound-images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "ffffound-images"
# (no preview_bucket_name → wrangler dev uses the same bucket name locally)

# Static assets — original ffffound CSS / JS / logo extracted from the WARC.
# Wrangler serves files in ./public at their literal path before invoking the Worker.
[assets]
directory = "./public"

# Cache aggressively at the edge. Every record is immutable.
[vars]
CACHE_MAX_AGE = "31536000"
# Image bytes are served directly from the R2 bucket via this custom domain,
# bypassing the Worker entirely. Bind the bucket to this hostname in the
# dashboard: R2 → ffffound-images → Settings → Custom Domains.
IMAGES_BASE_URL = "https://img.ffffound.online"
